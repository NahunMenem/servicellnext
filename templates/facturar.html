{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl mx-auto mt-10 bg-base-100 shadow rounded-lg p-6 space-y-6">

  <h1 class="text-2xl font-bold text-base-400 text-center flex items-center gap-2">
    <i data-lucide="file-text"></i> Generar Factura
  </h1>

  {% if mensaje %}
    <div class="bg-green-100 text-green-800 p-3 rounded">{{ mensaje }}</div>
  {% endif %}

  <form method="POST" class="space-y-4">

    <div>
      <label class="block text-sm font-medium text-base-400">DNI del Cliente</label>
      <input type="text" name="cuit" class="w-full p-2 rounded bg-base-300 text-black border border-base-400 focus:outline-none focus:ring-2 focus:ring-primary-600" required>
    </div>

    <div>
      <label class="block text-sm font-medium text-base-400">Descripción</label>
      <input type="text" name="descripcion" class="w-full p-2 rounded bg-base-300 text-black border border-base-400 focus:outline-none focus:ring-2 focus:ring-primary-600" required>
    </div>

    <div>
      <label class="block text-sm font-medium text-base-400">Monto</label>
      <input type="number" step="0.01" name="monto" class="w-full p-2 rounded bg-base-300 text-black border border-base-400 focus:outline-none focus:ring-2 focus:ring-primary-600" required>
    </div>

    <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white py-2 rounded">
      Generar Factura
    </button>
  </form>
</div>
{% endblock %}
