{% extends "base.html" %}

{% block content %}
<div class="px-6 py-10">
  <!-- Título -->
  <div class="mb-10 text-center">
    <h1 class="text-3xl font-bold text-white">Bienvenido, {{ session.get('username')|upper }}</h1>
    <p class="text-gray-400 mt-2">Accedé rápidamente a tus funciones principales.</p>
  </div>

  <!-- Tarjetas de accesos rápidos -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 max-w-6xl mx-auto">
    <!-- Caja -->
    <a href="{{ url_for('caja') }}" class="bg-gray-800 hover:bg-gray-700 transition-all rounded-2xl p-6 shadow flex flex-col items-center gap-3 border border-gray-700 hover:scale-[1.02]">
      <i data-lucide="calculator" class="w-10 h-10 text-white"></i>
      <span class="text-white font-semibold">Caja</span>
    </a>

    <!-- Ventas -->
    <a href="{{ url_for('registrar_venta') }}" class="bg-gray-800 hover:bg-gray-700 transition-all rounded-2xl p-6 shadow flex flex-col items-center gap-3 border border-gray-700 hover:scale-[1.02]">
      <i data-lucide="shopping-cart" class="w-10 h-10 text-white"></i>
      <span class="text-white font-semibold">Ventas</span>
    </a>

    <!-- Stock -->
    <a href="{{ url_for('agregar_stock') }}" class="bg-gray-800 hover:bg-gray-700 transition-all rounded-2xl p-6 shadow flex flex-col items-center gap-3 border border-gray-700 hover:scale-[1.02]">
      <i data-lucide="package" class="w-10 h-10 text-white"></i>
      <span class="text-white font-semibold">Stock</span>
    </a>

    <!-- Reparaciones -->
    <a href="{{ url_for('reparaciones') }}" class="bg-gray-800 hover:bg-gray-700 transition-all rounded-2xl p-6 shadow flex flex-col items-center gap-3 border border-gray-700 hover:scale-[1.02]">
      <i data-lucide="wrench" class="w-10 h-10 text-white"></i>
      <span class="text-white font-semibold">Reparaciones</span>
    </a>

    <!-- Cotizar -->
    <a href="{{ url_for('cotizar') }}" class="bg-gray-800 hover:bg-gray-700 transition-all rounded-2xl p-6 shadow flex flex-col items-center gap-3 border border-gray-700 hover:scale-[1.02]">
      <i data-lucide="dollar-sign" class="w-10 h-10 text-white"></i>
      <span class="text-white font-semibold">Cotizar</span>
    </a>

    <!-- Dashboard -->
    <a href="{{ url_for('dashboard') }}" class="bg-gray-800 hover:bg-gray-700 transition-all rounded-2xl p-6 shadow flex flex-col items-center gap-3 border border-gray-700 hover:scale-[1.02]">
      <i data-lucide="bar-chart-3" class="w-10 h-10 text-white"></i>
      <span class="text-white font-semibold">Dashboard</span>
    </a>
  </div>

  <!-- Fecha -->
  <div class="text-center mt-12 text-gray-400 text-sm" id="fecha"></div>
</div>

<script>
  // Mostrar la fecha actual
  const fechaElemento = document.getElementById('fecha');
  const opcionesFecha = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  const fechaActual = new Date().toLocaleDateString('es-ES', opcionesFecha);
  fechaElemento.textContent = fechaActual;
</script>
{% endblock %}
